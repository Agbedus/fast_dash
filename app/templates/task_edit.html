{% extends "base.html" %}

{% block title %}Edit Task - {{ task.name }}{% endblock %}

{% block content %}
<div class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <a href="/tasks/{{ task.id }}" class="text-slate-400 hover:text-slate-200 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            <h1 class="text-2xl font-bold text-slate-100">Edit Task</h1>
        </div>

        <form method="POST" class="glass-elevated rounded-xl p-6 space-y-6">
            <!-- Basic Info -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Task Name</label>
                <input type="text" name="name" value="{{ task.name }}" required
                       class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
                <textarea name="description" rows="3"
                          class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ task.description or '' }}</textarea>
            </div>

            <!-- Settings -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Status</label>
                    <select name="status" class="w-full bg-slate-800 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="task" {% if task.status == 'task' %}selected{% endif %}>Task</option>
                        <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                        <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
                        <option value="waiting" {% if task.status == 'waiting' %}selected{% endif %}>Waiting</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Priority</label>
                    <select name="priority" class="w-full bg-slate-800 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                        <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                        <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Project</label>
                    <select name="project_id" class="w-full bg-slate-800 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">No Project</option>
                        {% for p in projects %}
                        <option value="{{ p.id }}" {% if task.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                 <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Due Date</label>
                    <input type="date" name="due_date" value="{{ task.due_date or '' }}"
                           class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <!-- Assignees (Multi-select) -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Assignees (Hold Ctrl/Cmd to select multiple)</label>
                <select name="assignees" multiple class="w-full bg-slate-800 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 h-32">
                    {% for u in users %}
                    <option value="{{ u.id }}" {% if u.id in current_assignee_ids %}selected{% endif %}>{{ u.full_name }} ({{ u.email }})</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-slate-500 mt-1">Select one or more users to assign to this task.</p>
            </div>

            <div class="pt-4 border-t border-white/10 flex justify-end gap-3">
                <a href="/tasks/{{ task.id }}" class="px-4 py-2 text-slate-400 hover:text-white transition-colors">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
