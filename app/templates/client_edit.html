{% extends "base.html" %}

{% block title %}Edit Client - {{ client.company_name }}{% endblock %}

{% block content %}
<div class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <a href="/clients/{{ client.id }}" class="text-slate-400 hover:text-slate-200 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            <h1 class="text-2xl font-bold text-slate-100">Edit Client</h1>
        </div>

        <form method="POST" class="glass-elevated rounded-xl p-6 space-y-6">
            <!-- Basic Info -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Company Name</label>
                <input type="text" name="company_name" value="{{ client.company_name }}" required
                       class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Contact Person</label>
                    <input type="text" name="contact_person_name" value="{{ client.contact_person_name or '' }}"
                           class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                    <input type="email" name="contact_email" value="{{ client.contact_email or '' }}"
                           class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <div>
                 <label class="block text-sm font-medium text-slate-300 mb-2">Website URL</label>
                 <input type="url" name="website_url" value="{{ client.website_url or '' }}"
                        class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="pt-4 border-t border-white/10 flex justify-end gap-3">
                <a href="/clients/{{ client.id }}" class="px-4 py-2 text-slate-400 hover:text-white transition-colors">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
